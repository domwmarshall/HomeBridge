name: Build HomeBridge Android APK

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: homebridge-native-release
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build self-contained Android release APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      CI: "1"
      NODE_ENV: "production"
      EXPO_NO_TELEMETRY: "1"

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22.13.1"
          cache: npm

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Verify public dependencies
        run: |
          if grep -q \
            'packages.applied-caas-gateway1.internal.api.openai.org' \
            package-lock.json
          then
            echo "Private dependency URLs remain."
            exit 1
          fi

      - name: Install dependencies
        run: |
          npm ci \
            --registry=https://registry.npmjs.org \
            --no-audit \
            --no-fund

      - name: Type-check application
        run: npm run typecheck

      - name: Generate native Android project
        run: |
          npx expo prebuild \
            --platform android \
            --clean \
            --non-interactive

      - name: Build bundled release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew \
            --no-daemon \
            --stacktrace \
            :app:assembleRelease

      - name: Verify JavaScript is packaged
        run: |
          APK="android/app/build/outputs/apk/release/app-release.apk"

          if [ ! -f "$APK" ]; then
            echo "Release APK not found."
            find android/app/build/outputs -type f || true
            exit 1
          fi

          if ! unzip -l "$APK" |
            grep -q 'assets/index.android.bundle'
          then
            echo "JavaScript bundle is missing from the APK."
            unzip -l "$APK" | grep assets || true
            exit 1
          fi

          echo "Embedded JavaScript bundle verified."

      - name: Prepare installable APK
        run: |
          mkdir -p release

          cp \
            android/app/build/outputs/apk/release/app-release.apk \
            release/HomeBridge-v0.5.2.apk

          cd release

          sha256sum \
            HomeBridge-v0.5.2.apk \
            > HomeBridge-v0.5.2.apk.sha256

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: HomeBridge-Android-v0.5.2
          path: release/*
          if-no-files-found: error
          retention-days: 30
