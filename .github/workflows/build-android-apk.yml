name: Build HomeBridge Android APK

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: homebridge-android-release
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build self-contained Android release APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      CI: "1"
      EXPO_NO_TELEMETRY: "1"

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22.13.1"

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install fresh dependencies
        run: |
          rm -f package-lock.json
          npm cache clean --force
          npm install \
            --registry=https://registry.npmjs.org \
            --legacy-peer-deps \
            --package-lock=false \
            --no-audit \
            --no-fund

      - name: Type-check application
        run: npm run typecheck

      - name: Generate native Android project
        run: |
          npx expo prebuild \
            --platform android \
            --clean \
            --non-interactive

      - name: Build bundled release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew \
            --no-daemon \
            --stacktrace \
            :app:assembleRelease

      - name: Verify release APK and embedded JavaScript
        run: |
          APK="android/app/build/outputs/apk/release/app-release.apk"

          if [ ! -f "$APK" ]; then
            echo "Release APK was not produced."
            find android/app/build/outputs -type f || true
            exit 1
          fi

          if ! unzip -l "$APK" | grep -q "assets/index.android.bundle"; then
            echo "The JavaScript bundle is missing from the APK."
            unzip -l "$APK" | grep -E "assets|bundle" || true
            exit 1
          fi

          echo "Release APK and embedded JavaScript bundle verified."

      - name: Prepare APK artifact
        run: |
          mkdir -p release

          cp \
            android/app/build/outputs/apk/release/app-release.apk \
            release/HomeBridge-v0.5.3.apk

          cd release
          sha256sum \
            HomeBridge-v0.5.3.apk \
            > HomeBridge-v0.5.3.apk.sha256

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HomeBridge-Android-v0.5.3
          path: release/*
          if-no-files-found: error
          retention-days: 30
