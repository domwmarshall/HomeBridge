name: Build HomeBridge Android APK

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: homebridge-android-release
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build HomeBridge v1.0.0 release APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CI: "1"
      EXPO_NO_TELEMETRY: "1"

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22.13.1"

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install fresh dependencies
        run: |
          rm -f package-lock.json
          npm install \
            --registry=https://registry.npmjs.org \
            --legacy-peer-deps \
            --package-lock=false \
            --include=dev \
            --no-audit \
            --no-fund

      - name: Type-check application
        run: npm run typecheck

      - name: Verify v1.0 messaging, invitations and safe-area source
        run: |
          grep -q 'SafeAreaProvider' App.tsx
          grep -q 'useSafeAreaInsets' App.tsx
          grep -q 'household_notifications' src/store/CommunicationContext.tsx
          grep -q 'item_requests' src/store/CommunicationContext.tsx
          grep -q 'household_messages' src/store/CommunicationContext.tsx
          grep -q 'create_household_invite_v4' src/store/WorkspaceContext.tsx
          if grep -R 'absoluteFillObject' src; then
            echo 'Unsupported absoluteFillObject remains.'
            exit 1
          fi

      - name: Verify UK calendar engine
        run: npm run test:calendar

      - name: Generate native Android project
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Build bundled release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon --stacktrace :app:assembleRelease

      - name: Verify release APK and embedded JavaScript
        run: |
          APK="android/app/build/outputs/apk/release/app-release.apk"
          test -f "$APK"
          unzip -l "$APK" | grep -q "assets/index.android.bundle"
          echo "Release APK and embedded JavaScript bundle verified."

      - name: Prepare APK artifact
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/release/app-release.apk release/HomeBridge-v1.0.0.apk
          cd release
          sha256sum HomeBridge-v1.0.0.apk > HomeBridge-v1.0.0.apk.sha256

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HomeBridge-Android-v1.0.0
          path: release/*
          if-no-files-found: error
          retention-days: 30
